              - type: grid
                title: Lawn Zones
                columns: 3
                square: false
                cards:
                  - type: entities
                    title: Lawn Zone 1
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: valve.lawn_zone_1
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.lawn_zone_1_runtime
                        name: Runtime
                      - entity: sensor.lawn_zone_1_history
                        name: Last Watered
                      - entity: script.irrigation_run_lawn_zone_1
                        name: Run Zone
                  - type: entities
                    title: Lawn Zone 2
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: valve.lawn_zone_2
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.lawn_zone_2_runtime
                        name: Runtime
                      - entity: sensor.lawn_zone_2_history
                        name: Last Watered
                      - entity: script.irrigation_run_lawn_zone_2
                        name: Run Zone
                  - type: entities
