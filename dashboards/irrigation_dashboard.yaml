              - type: grid
                title: Plant Zones
                columns: 4
                square: false
                cards:
                  - type: entities
                    title: Plant Zone 1
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: >-
                          valve.plant_zone_1
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.plant_zone_1_runtime
                        name: Runtime
                      - entity: sensor.plant_zone_1_history
                        name: Last Watered
                      - entity: script.irrigation_run_plant_zone_1
                        name: Run Zone
                  - type: entities
                    title: Plant Zone 2
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: >-
                          valve.plant_zone_2
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.plant_zone_2_runtime
                        name: Runtime
                      - entity: sensor.plant_zone_2_history
                        name: Last Watered
                      - entity: script.irrigation_run_plant_zone_2
                        name: Run Zone
                  - type: entities
                    title: Plant Zone 3
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: >-
                          valve.plant_zone_3
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.plant_zone_3_runtime
                        name: Runtime
                      - entity: sensor.plant_zone_3_history
                        name: Last Watered
                      - entity: script.irrigation_run_plant_zone_3
                        name: Run Zone
                  - type: entities
                    title: Plant Zone 4
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: valve.plant_zone_4
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.plant_zone_4_runtime
                        name: Runtime
                      - entity: sensor.plant_zone_4_history
                        name: Last Watered
                      - entity: script.irrigation_run_plant_zone_4
                        name: Run Zone
              - type: grid
                title: Manual / Diagnostics
                columns: 3
                square: false
                cards:
                  - type: entities
                    title: Manual Mist
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: valve.manual_mist_zone
                        name: Valve
                        secondary_info: last-changed
                      - entity: input_number.manual_mist_runtime
                        name: Runtime
                      - entity: input_boolean.irrigation_manual_mist_enable
                        name: Run Mister
                      - entity: sensor.manual_mist_zone_history
                        name: Last Used
                  - type: entities
                    title: Timer Batteries
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: sensor.irrigation_controller_1_battery
                        name: Controller 1
                      - entity: sensor.irrigation_controller_2_battery
                        name: Controller 2
                      - entity: sensor.irrigation_controller_3_battery
                        name: Controller 3
                      - entity: sensor.irrigation_controller_4_battery
                        name: Controller 4
                  - type: entities
                    title: Timer Faults
                    show_header_toggle: false
                    state_color: true
                    entities:
                      - entity: binary_sensor.irrigation_controller_1_fault
                        name: Controller 1
                      - entity: binary_sensor.irrigation_controller_2_fault
                        name: Controller 2
                      - entity: binary_sensor.irrigation_controller_3_fault
                        name: Controller 3
                      - entity: binary_sensor.irrigation_controller_4_fault
                        name: Controller 4
          - type: vertical-stack
